let quizSubmitted = false;

// ============================================================
//  RENDER QUIZ
// ============================================================
function renderQuiz() {
    const container = document.getElementById('quiz');
    let html = `<div class="progress">${questions.length} Questions</div>`;
    questions.forEach((q, index) => {
        html += `<div class="question-block" id="q${index}">`;
        html += `<p>${index+1}. ${q.q}</p>`;
        html += `<div class="options" id="options${index}">`;
        q.o.forEach((opt, oi) => {
            html += `
                <label id="label${index}_${oi}">
                    <input type="radio" name="q${index}" value="${oi}">
                    ${opt}
                </label>
            `;
        });
        html += `</div></div>`;
    });
    container.innerHTML = html;
    document.getElementById('scoreDisplay').classList.remove('show');
    document.getElementById('showAnswersBtn').disabled = true;
    quizSubmitted = false;
}

// ============================================================
//  SUBMIT QUIZ
// ============================================================
function submitQuiz() {
    let score = 0;
    let total = questions.length;
    let allAnswered = true;

    questions.forEach((q, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        const block = document.getElementById(`q${index}`);
        block.classList.remove('correct', 'wrong');

        if (selected) {
            const userAnswer = parseInt(selected.value);
            if (userAnswer === q.a) {
                score++;
                block.classList.add('correct');
            } else {
                block.classList.add('wrong');
                document.getElementById(`label${index}_${userAnswer}`).classList.add('wrong-answer');
            }
        } else {
            allAnswered = false;
            block.style.borderLeftColor = '#da3633';
        }
    });

    quizSubmitted = true;
    document.getElementById('showAnswersBtn').disabled = false;

    const scoreDiv = document.getElementById('scoreDisplay');
    const percent = Math.round((score / total) * 100);
    let emoji = percent === 100 ? '🎉' : percent >= 70 ? '💪' : '📚';
    let msg = percent === 100 ? 'Perfect score! You\'re an OWASP WSTG expert!' :
              percent >= 70 ? 'Great job! You know your OWASP WSTG well!' :
              'Keep studying the OWASP WSTG — you\'ll get there!';

    scoreDiv.innerHTML = `
        <div>${emoji} You scored ${score} out of ${total} (${percent}%)</div>
        <div class="detail">${msg}</div>
        ${!allAnswered ? '<div class="detail" style="color:#da3633;">⚠️ Some questions were not answered</div>' : ''}
        <div class="detail" style="color:#8b949e; margin-top:12px;">💡 Click "Show Correct Answers" to see the right answers</div>
    `;
    scoreDiv.classList.add('show');
    scoreDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ============================================================
//  SHOW CORRECT ANSWERS
// ============================================================
function showCorrectAnswers() {
    if (!quizSubmitted) return;

    questions.forEach((q, index) => {
        const block = document.getElementById(`q${index}`);
        const correctIndex = q.a;

        const correctLabel = document.getElementById(`label${index}_${correctIndex}`);
        if (correctLabel) {
            correctLabel.classList.add('show-correct');
        }

        block.classList.add('show-answer');
    });

    document.getElementById('showAnswersBtn').disabled = true;
    document.getElementById('showAnswersBtn').textContent = '✅ Answers Revealed';
}

// ============================================================
//  RESET QUIZ
// ============================================================
function resetQuiz() {
    renderQuiz();
    document.getElementById('showAnswersBtn').textContent = '📖 Show Correct Answers';
    document.getElementById('showAnswersBtn').disabled = true;
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================================
//  INIT
// ============================================================
renderQuiz();
</script>
